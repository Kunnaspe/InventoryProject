<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logout - Convenience Store Inventory</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        .logout-box {
            background: #fff;
            padding: 40px 50px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            text-align: center;
            width: 320px;
        }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 12px; }
        p { color: #555; margin-bottom: 24px; }
        .btn-logout {
            background-color: #d9534f;
            color: #fff;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-logout:hover { background-color: #c9302c; }
        .btn-cancel {
            display: inline-block;
            margin-top: 14px;
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .btn-cancel:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="logout-box">
        <h1>Sign Out</h1>
        <p>Are you sure you want to sign out of the inventory system?</p>

        <!-- POST to the allauth logout URL; CSRF token is required -->
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn-logout">Sign Out</button>
        </form>

        <br>
        <a href="{% url 'product_list' %}" class="btn-cancel">Cancel — stay signed in</a>
    </div>
</body>
</html>
